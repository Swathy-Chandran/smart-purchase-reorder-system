{% extends 'reorder_app/base.html' %}
{% block content %}
<div class="page-actions">
        <a href="{% url 'supplier_list' %}" class="btn btn-primary">
            <i class="fas fa-arrow-left"></i> Return to List
        </a>
    </div>
<style>
.form-page {
    padding: 32px;
    background: #f8fafc;
    min-height: 100vh;
}



.form-card {
    max-width: 900px;
    margin: 0 auto;
    background: #ffffff;
    padding: 30px 36px;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
}

.form-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 24px;
    color: #0f172a;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px 24px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group.full {
    grid-column: span 2;
}

.form-group label {
    font-size: 13px;
    font-weight: 600;
    color: #475569;
    margin-bottom: 6px;
}

.form-input {
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
    background: #ffffff;
    color: #0f172a;
    width: 100%;
}

.form-textarea {
    min-height: 90px;
    resize: vertical;
}

.checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
}

.form-actions {
    display: flex;
    gap: 14px;
    margin-top: 30px;
}

.btn-primary {
    background: #2563eb;
    color: white;
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    font-weight: 600;
    cursor: pointer;
}

.btn-secondary {
    background: #f1f5f9;
    color: #334155;
    padding: 10px 22px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    border: 1px solid #cbd5e1;
}
.page-actions {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 16px;
}

</style>

<div class="form-page">
    <div class="form-card">

        <div class="form-title">
            🏭 Update Supplier
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="form-grid">

                <div class="form-group full">
                    <label>Name</label>
                    <input
                        type="text"
                        name="name"
                        class="form-input"
                        value="{{ supplier.name }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input
                        type="email"
                        name="email"
                        class="form-input"
                        value="{{ supplier.email }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input
                        type="text"
                        name="phone"
                        class="form-input"
                        value="{{ supplier.phone }}"
                        required
                    >
                </div>

                <div class="form-group full">
                    <label>Address</label>
                    <textarea
                        name="address"
                        class="form-input form-textarea"
                        required
                    >{{ supplier.address }}</textarea>
                </div>

                <div class="form-group">
                    <label>Performance Rating</label>
                    <input
                        type="number"
                        step="0.01"
                        min="0"
                        max="100"
                        name="performance_rating"
                        class="form-input"
                        value="{{ supplier.performance_rating }}"
                    >
                </div>

                <div class="form-group checkbox-row">
                    <input
                        type="checkbox"
                        name="is_active"
                        {% if supplier.is_active %}checked{% endif %}
                    >
                    <label>Active</label>
                </div>

            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Update Supplier</button>
                <a href="{% url 'supplier_list' %}" class="btn-secondary">Cancel</a>
            </div>

        </form>

    </div>
</div>

{% endblock %}
