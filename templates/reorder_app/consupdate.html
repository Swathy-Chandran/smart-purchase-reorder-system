{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <a href="{% url 'consumer' %}" class="btn btn-primary"><i class="fas fa-arrow-left"></i>Return to List</a><br><br>
        <div class="card shadow">
            <div class="card-body">
                <h1 class="ms-3 text-center">Consumption Details</h1>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                   
                    <button type="submit" class="btn btn-primary w-25">Edit</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
