{% extends 'reorder_app/base.html' %}
{% block content %}

<div class="container-fluid">

    <!-- Back Button -->
    <div class="page-actions">
        <a href="{% url 'reorder' %}" class="btn btn-primary">
            <i class="fas fa-arrow-left"></i> Return to List
        </a>
    </div>

    <!-- ERP-Style Form -->
    <form method="post" class="erp-form">
        {% csrf_token %}

        <h3 class="mb-4 fw-bold text-center">Reorder Rule Form</h3>

        <!-- Product -->
        <div class="form-row">
            <label>Product</label>
            {{ form.product }}
        </div>

        <!-- Minimum Quantity -->
        <div class="form-row">
            <label>Minimum Quantity</label>
            {{ form.min_qty }}
        </div>

        <!-- Maximum Quantity -->
        <div class="form-row">
            <label>Maximum Quantity</label>
            {{ form.max_qty }}
        </div>

        <!-- Reorder Quantity -->
        <div class="form-row">
            <label>Reorder Quantity</label>
            {{ form.reorder_qty }}
        </div>

        <!-- Active Checkbox -->
        <div class="form-row checkbox-row">
            <label></label>
            {{ form.is_active }} <span>Active</span>
        </div>

        <!-- Buttons -->
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Save</button>
            <a href="{% url 'reorder' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>

    </form>

</div>

<style>
/* ERP-style form */
.erp-form {
    max-width: 700px;
    margin: 0 auto;
    margin-top: 20px;
}

.erp-form h3 {
    color: #2c3e50;
}

.erp-form .form-row {
    display: grid;
    grid-template-columns: 180px 1fr;
    align-items: center;
    margin-bottom: 14px;
}

.erp-form label {
    font-weight: 600;
    color: #2c3e50;
    font-size: 14px;
}

.erp-form input,
.erp-form select {
    max-width: 360px;
    height: 36px;
    padding: 6px 10px;
    font-size: 14px;
}

.erp-form input[type="number"] {
    max-width: 160px;
}

.checkbox-row span {
    margin-left: 6px;
    font-size: 14px;
}

.form-actions {
    margin-top: 24px;
    padding-left: 180px;
}

.form-actions .btn {
    min-width: 100px;
}

.page-actions {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 20px;
}
</style>

{% endblock %}
