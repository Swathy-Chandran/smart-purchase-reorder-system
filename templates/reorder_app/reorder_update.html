{% extends "reorder_app/base.html" %}
{% block content %}

<div class="card shadow-sm p-4 position-relative" style="max-width:700px; margin:auto;">

    <!-- Top right button -->
    <a href="{% url 'reorder' %}"
       class="btn btn-primary"
       style="position:absolute; top:15px; right:15px;">
        Return to List
    </a>

    <h4 class="mb-4">📦 Update Reorder Rule</h4>


        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Product</label>
                {{ form.product }}
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Min Qty</label>
                    {{ form.min_qty }}
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Max Qty</label>
                    {{ form.max_qty }}
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Reorder Qty</label>
                    {{ form.reorder_qty }}
                </div>
            </div>

            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-primary">Update Rule</button>
                <a href="{% url 'reorder_rule_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>

    </div>
</div>

{% endblock %}
